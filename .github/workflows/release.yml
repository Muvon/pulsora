name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # Matches semver tags like 0.1.0, 1.0.0, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (semver format, e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          archive: tar.gz
        - target: aarch64-unknown-linux-musl
          os: ubuntu-22.04-arm
          archive: tar.gz
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          archive: zip
        - target: aarch64-pc-windows-msvc
          os: windows-11-arm
          archive: zip
        - target: x86_64-apple-darwin
          os: macos-13
          archive: tar.gz
        - target: aarch64-apple-darwin
          os: macos-15
          archive: tar.gz

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        targets: ${{ matrix.target }}

    - name: Install protobuf compiler (macOS)
      if: startsWith(matrix.os, 'macos')
      run: brew install protobuf

    - name: Install protobuf compiler (Windows)
      if: startsWith(matrix.os, 'windows')
      run: |
        choco install protoc

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ endsWith(matrix.target, '-unknown-linux-musl') && 'docker-alpine' || runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ endsWith(matrix.target, '-unknown-linux-musl') && 'docker-alpine' || runner.os }}-${{ matrix.target }}-cargo-
          ${{ endsWith(matrix.target, '-unknown-linux-musl') && 'docker-alpine' || runner.os }}-cargo-

    - name: Build binary
      shell: sh
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          # Use official Rust Docker image for Linux builds
          # Disable default features to avoid ONNX Runtime issues (same as Windows)
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            rust:1.95.0-alpine3.21 \
            sh -c "
              apk add --no-cache git musl-dev openssl-dev openssl-libs-static pkgconfig gcc g++ protobuf-dev && \
              rustup target add ${{ matrix.target }} && \
              cargo build --release --target ${{ matrix.target }} --no-default-features
            "
        elif [ "${{ runner.os }}" = "Windows" ]; then
          # Windows: disable default features to avoid ONNX Runtime issues
          cargo build --release --target ${{ matrix.target }} --no-default-features
        else
          # Native build for other platforms (macOS)
          cargo build --release --target ${{ matrix.target }}
        fi

    - name: Create archive directory
      shell: sh
      run: mkdir -p dist

    - name: Create archive (Unix)
      if: matrix.archive == 'tar.gz'
      shell: sh
      run: |
        cd target/${{ matrix.target }}/release
        case "${{ matrix.target }}" in
          *windows*)
            tar czf ../../../dist/pulsora-${{ inputs.tag || github.ref_name }}-${{ matrix.target }}.tar.gz pulsora.exe
            ;;
          *)
            tar czf ../../../dist/pulsora-${{ inputs.tag || github.ref_name }}-${{ matrix.target }}.tar.gz pulsora
            ;;
        esac

    - name: Create archive (Windows)
      if: matrix.archive == 'zip'
      shell: sh
      run: |
        cd target/${{ matrix.target }}/release
        7z a ../../../dist/pulsora-${{ inputs.tag || github.ref_name }}-${{ matrix.target }}.zip pulsora.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.target }}
        path: dist/*
        if-no-files-found: error

  publish-crate:
    name: Publish to Crates.io
    needs: build
    uses: muvon/ci-workflow/.github/workflows/rust-publish.yml@master
    secrets: inherit
    with:
      tag: ${{ inputs.tag }}
      publish-flags: '--no-default-features'
      setup-protoc: true

  release:
    name: Create Release
    needs: [build, publish-crate]
    uses: muvon/ci-workflow/.github/workflows/release.yml@master
    with:
      tag: ${{ inputs.tag }}
      artifacts: 'release-*'
      draft: false

  docker:
    name: Build and Push Docker Images
    needs: release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      id: repo
      run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ steps.repo.outputs.repository }}:latest
          ghcr.io/${{ steps.repo.outputs.repository }}:${{ needs.release.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
